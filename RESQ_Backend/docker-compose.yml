# ===============================================
# RESQ Backend Docker Compose
# ===============================================
#
# Hướng dẫn sử dụng:
# 1. Clone repo backend về máy
# 2. Cấu hình Firebase credentials — chọn 1 trong 2 cách:
#    Cách A (khuyên dùng): tạo file .env cùng thư mục với docker-compose.yml:
#      FIREBASE_CREDENTIALS_JSON=<nội dung file JSON trên 1 dòng>
#    Cách B: base64-encode rồi đặt vào .env:
#      # Linux/macOS: base64 -w0 "PRM PE 142 Firebase Admin SDK.json"
#      # Windows PS : [Convert]::ToBase64String([IO.File]::ReadAllBytes("PRM PE 142 Firebase Admin SDK.json"))
#      FIREBASE_CREDENTIALS_JSON_BASE64=<chuỗi base64>
# 3. Build và chạy:
#    docker compose up -d --build
# 4. Backend API: http://localhost:8080
#    Swagger UI: http://localhost:8080/swagger
#
# Thông tin đăng nhập mẫu:
# - admin / Admin@123
# - coordinator / Coordinator@123
# - rescuer / Rescuer@123
# - manager / Manager@123
# - victim / Victim@123
#
# ===============================================

services:
  # PostgreSQL Database with PostGIS
  resq-db:
    image: postgis/postgis:16-3.4
    container_name: resq-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: RESQ
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  resq-redis:
    image: redis:7-alpine
    container_name: resq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - resq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RESQ Backend API (build local, native architecture)
  resq-api:
    image: resq-backend-local:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    container_name: resq-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__ResQDb=Host=resq-db;Port=5432;Database=RESQ;Username=postgres;Password=postgres123
      - Redis__ConnectionString=resq-redis:6379
      - JwtSettings__SecretKey=YourSuperSecretKeyForJwtTokenGeneration_AtLeast32Characters!
      - JwtSettings__Issuer=RESQ.API
      - JwtSettings__Audience=RESQ.Client
      - JwtSettings__AccessTokenExpirationMinutes=60
      - JwtSettings__RefreshTokenExpirationDays=7
      # ── Firebase credentials ────────────────────────────────────────────────
      # Option A (recommended for Docker): paste the raw JSON as an env var.
      #   Set FIREBASE_CREDENTIALS_JSON in a .env file or your CI/CD secrets.
      # Option B: base64-encode the JSON and set FIREBASE_CREDENTIALS_JSON_BASE64.
      # Option C (file mount): uncomment the volumes block below and set
      #   FIREBASE_CONFIG to the absolute path of the JSON file on your host.
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON:-}
      - FIREBASE_CREDENTIALS_JSON_BASE64=${FIREBASE_CREDENTIALS_JSON_BASE64:-}
    # volumes:
    #   - type: bind
    #     source: ${FIREBASE_CONFIG}   # absolute path on host — no ~ expansion on Windows
    #     target: /app/PRM PE 142 Firebase Admin SDK.json
    #     read_only: true
    depends_on:
      resq-db:
        condition: service_healthy
      resq-redis:
        condition: service_healthy
    networks:
      - resq-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  resq-network:
    driver: bridge
